apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-service
  labels:
    app: edge-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-service
  template:
    metadata:
      labels:
        app: edge-service
    spec:
      hostAliases:
        - ip: 10.96.176.115
          hostnames:
            - auth.localhost
      containers:
        - name: edge-service
          image: sinedon/edge-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker

            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"

            - name: CONTENT_SERVICE_URL
              value: http://content-manager

            - name: PROGRESS_SERVICE_URL
              value: http://progress-manager

            - name: KEYCLOAK_CLIENT_SECRET
              value: edge-secret-dev-123

            - name: KEYCLOAK_ISSUER_URI
              value: http://auth.localhost/realms/picture-dictionary
---
apiVersion: v1
kind: Service
metadata:
  name: edge-service
spec:
  selector:
    app: edge-service
  ports:
    - port: 80
      targetPort: 8080
